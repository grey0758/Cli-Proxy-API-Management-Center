# Place inside the cliproxy.opencodex.uk TLS server block. Authentication is
# delegated to the existing internal CLIProxy Management API auth location.
location = /v0/management/phone-pool {
    auth_request /_cliproxy_account_pool_auth;
    proxy_pass http://127.0.0.1:18317;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
    add_header Cache-Control "no-store, private" always;
    add_header Pragma "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}

location ~ ^/v0/management/phone-pool/(?:import|bind|unbind|enabled|request-code)$ {
    auth_request /_cliproxy_account_pool_auth;
    client_max_body_size 256k;
    proxy_pass http://127.0.0.1:18317;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_read_timeout 20s;
    proxy_send_timeout 15s;
    add_header Cache-Control "no-store, private" always;
    add_header Pragma "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}
